name: Deploy After the Tests

on:
  workflow_run:
    workflows: ["Run Tests"]   
    types: [completed]         

jobs:
  deploy:
   # if: ${{ github.event.workflow_run.conclusion == 'success' }}  
    runs-on: ubuntu-latest

    steps:
      - name: stop if test fail
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
         echo "TEST FAIL"
          exit 1
        
    
      - name: Checkout the code
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: actions/checkout@v4
        
      - name: Deploy
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        run: |
          echo "Application deployed "
         
