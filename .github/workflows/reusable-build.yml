name: Reusable Build
on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      environment:
        required: true
        type: string
        default: staging
    secrets:
      docker_token:
        required: true 
jobs:
  reusable-build:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Print Info 
        run:  echo "The app is: ${{inputs.app_name}} for ${{inputs.environment}}"
      - name: Print Token
        run: |
            if [ -n "${{secrets.docker_token}}" ]; then
            echo "true"
            fi
             
         
