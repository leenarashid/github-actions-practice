name: Job-outputs
on:
  workflow_dispatch:

jobs:
  date:
    runs-on: ubuntu-latest
    outputs:
      today_date: ${{ steps.set-date.outputs.date }} 
    steps:
      - name: Current Date
        id: set-date 
        run: echo "date=$(date)" >> $GITHUB_OUTPUT
      

  print-date:
    runs-on: ubuntu-latest
    needs: date 
    steps:
      - name: Print current date 
        run: echo "Current date is:" ${{ needs.date.outputs.today_date }}
      
