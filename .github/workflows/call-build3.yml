name: Call Build
on:
  push:
    branches: [main]
jobs:
  build:
    uses: ./.github/workflows/reusable-build3.yml
    with:
      app_name: "myapp"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKERHUB_TOKEN }}
  print-job:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo ${{ needs.build.outputs.build-version }}
