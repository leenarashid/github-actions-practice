name: Reusable Build2

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: staging
    secrets:
      docker_token:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Info
        run: echo "The ${{ inputs.app_name }} is for ${{inputs.environment}}"
      - name: Docker Token
        run: |
           if [ -n "${{ secrets. docker_token }}" ]; then   
             echo "Docker token is set: true"
            fi           
