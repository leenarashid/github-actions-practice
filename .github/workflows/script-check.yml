name: Script Checker

on:
  workflow_dispatch:

jobs:
  script-check:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Start server
        run: node app.js &
      
      - name: Wait for server
        run: sleep 5

      - name: Test endpoint
        run: curl http://localhost:3000
