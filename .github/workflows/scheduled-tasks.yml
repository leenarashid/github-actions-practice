name: Schedule Tasks
on: 
  schedule:
   - cron: '30 2 * * 1'
   - cron: '0 */6 * * *'
jobs:
  triggered-scedule:
    runs-on: ubuntu-latest
    steps:
      - name: Print Schedule Trigger
        run: |
            echo "The schedule is triggered on ${{ github.event.schedule }}"
      - name: Health check
        run: |
           curl -f http://localhost:8000 || (echo "Health check failed!" && exit 1)



            
       
 
